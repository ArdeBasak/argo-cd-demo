apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-cd-demo
  labels:
    app: argo-cd-demo
spec:
  replicas: 1
  template:
    metadata:
      labels:
        app: argo-cd-demo
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          imagePullPolicy: IfNotPresent
  selector:
    matchLabels:
      app: argo-cd-demo
